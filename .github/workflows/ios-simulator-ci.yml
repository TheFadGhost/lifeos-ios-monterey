name: iOS Simulator CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Validate committed Xcode project
        working-directory: LifeOS
        run: xcodebuild -list -project LifeOS.xcodeproj

      - name: Select simulator
        id: simulator
        run: |
          set -euo pipefail
          DEVICE_ID="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {print $2; exit}')"
          if [ -z "$DEVICE_ID" ]; then
            echo "No available iPhone simulator found."
            xcrun simctl list devices available
            exit 1
          fi
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"

      - name: Build and test
        working-directory: LifeOS
        run: |
          xcodebuild test \
            -project LifeOS.xcodeproj \
            -scheme LifeOS \
            -destination "id=${{ steps.simulator.outputs.device_id }}" \
            -derivedDataPath ../build/DerivedData \
            CODE_SIGNING_ALLOWED=NO
